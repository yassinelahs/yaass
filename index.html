<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAJA vs CODM</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:15px;
}

.ticket{
    width:100%;
    max-width:420px;
    background:#fff;
    border-radius:28px;
    padding:20px;
    overflow:hidden;
}

.close{
    display:flex;
    justify-content:flex-end;
    font-size:28px;
    color:#888;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:10px;
}

.team{
    text-align:center;
}

.team img{
    width:80px;
    height:80px;
    object-fit:contain;
}

.team-name{
    margin-top:6px;
    font-weight:700;
}

.center{
    text-align:center;
}

.date{
    color:#888;
    font-size:13px;
}

.days{
    color:#666;
    margin-top:5px;
}

.time{
    font-size:48px;
    font-weight:800;
    color:#222;
}

/* QR */

.qr-container{
    margin-top:20px;
    text-align:center;
}

.qr-box{
    width:230px;
    height:230px;
    margin:auto;
    position:relative;
    background:#fff;
    border-radius:14px;
    overflow:hidden;
    border:1px solid #ddd;
}

.qr-image{
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:.22;
    filter:blur(1px);
}

.snake{
    position:absolute;
    width:90px;
    height:8px;
    background:#00d84a;
    border-radius:20px;
    box-shadow:
    0 0 10px #00ff66,
    0 0 20px #00ff66;
    animation:snakeMove 5s linear infinite;
}

@keyframes snakeMove{

    0%{
        top:0;
        left:0;
        width:90px;
        height:8px;
    }

    25%{
        top:0;
        left:140px;
        width:90px;
        height:8px;
    }

    25.1%{
        top:0;
        left:222px;
        width:8px;
        height:90px;
    }

    50%{
        top:140px;
        left:222px;
        width:8px;
        height:90px;
    }

    50.1%{
        top:222px;
        left:140px;
        width:90px;
        height:8px;
    }

    75%{
        top:222px;
        left:0;
        width:90px;
        height:8px;
    }

    75.1%{
        top:140px;
        left:0;
        width:8px;
        height:90px;
    }

    100%{
        top:0;
        left:0;
        width:8px;
        height:90px;
    }

}

.qr-box::after{
    content:'';
    position:absolute;
    inset:0;
    border:2px solid rgba(0,216,74,.15);
    border-radius:14px;
}

/* Arrows */

.nav{
    display:flex;
    justify-content:space-between;
    margin-top:-130px;
    position:relative;
    z-index:5;
}

.arrow{
    font-size:28px;
    color:#00c853;
}

/* Text */

.security{
    margin-top:120px;
    text-align:center;
    color:#444;
    line-height:1.5;
}

/* Green Card */

.card{
    margin-top:20px;
    background:#00c853;
    color:white;
    border-radius:20px;
    padding:20px;
}

.row{
    display:flex;
    justify-content:space-between;
    margin-bottom:18px;
}

.label{
    font-size:14px;
    opacity:.95;
}

.value{
    font-size:18px;
    font-weight:700;
    margin-top:5px;
}

.timer{
    font-size:34px;
    font-weight:800;
}

.code{
    float:right;
    background:rgba(255,255,255,.2);
    padding:8px 14px;
    border-radius:10px;
    font-weight:bold;
}

/* Button */

.transfer{
    width:100%;
    height:62px;
    border:none;
    margin-top:20px;
    border-radius:16px;
    background:#00c853;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    cursor:pointer;
    font-size:20px;
    font-weight:600;
}

.transfer svg{
    width:24px;
    height:24px;
}

.page{
    text-align:center;
    margin-top:10px;
    color:#777;
    font-weight:600;
}

</style>
</head>

<body>

<div class="ticket">

<div class="close">×</div>

<div class="header">

    <div class="team">
        <img src="rca.png">
        <div class="team-name">RAJA</div>
    </div>

    <div class="center">
        <div class="date" id="date"></div>
        <div class="days">Aujourd'hui</div>
        <div class="time">15:00</div>
    </div>

    <div class="team">
        <img src="codm.png">
        <div class="team-name">CODM</div>
    </div>

</div>

<div class="qr-container">

    <div class="qr-box">

        <img src="qr.png" class="qr-image">

        <div class="snake"></div>

    </div>

    <div class="nav">
        <div class="arrow">‹</div>
        <div class="arrow">›</div>
    </div>

</div>

<div class="security">
    Pour votre sécurité,<br>
    votre QR Code s'affichera quelques heures avant le match.
</div>

<div class="card">

    <div class="row">

        <div>
            <div class="label">Catégorie</div>
            <div class="value">Tribune Est - Sud</div>
        </div>

        <div>
            <div class="label">Porte</div>
            <div class="value">23</div>
        </div>

        <div>
            <div class="label">Zone</div>
            <div class="value">Zone 7</div>
        </div>

    </div>

    <div class="row">

        <div>
            <div class="label">Rang</div>
            <div class="value">AW</div>
        </div>

        <div>
            <div class="label">Siège</div>
            <div class="value">28</div>
        </div>

    </div>

    <div class="timer" id="countdown"></div>

    <div class="code">F4PM</div>

</div>

<button class="transfer">

<svg viewBox="0 0 24 24" fill="none">
<path d="M22 2L11 13"
stroke="white"
stroke-width="2"
stroke-linecap="round"/>

<path d="M22 2L15 22L11 13L2 9L22 2Z"
stroke="white"
stroke-width="2"
stroke-linejoin="round"/>
</svg>

<span>Transférer le billet</span>

</button>

<div class="page">1/5</div>

</div>

<script>

const now = new Date();

document.getElementById('date').innerHTML =
now.toLocaleDateString('fr-FR',{
weekday:'long',
day:'numeric',
month:'long',
year:'numeric'
});

let target = new Date();
target.setHours(15,0,0,0);

function countdown(){

let diff = target - new Date();

if(diff < 0){
document.getElementById('countdown').innerHTML='MATCH LIVE';
return;
}

let h = Math.floor(diff/1000/60/60);
let m = Math.floor(diff/1000/60)%60;
let s = Math.floor(diff/1000)%60;

document.getElementById('countdown').innerHTML =
String(h).padStart(2,'0') + ':' +
String(m).padStart(2,'0') + ':' +
String(s).padStart(2,'0');

}

setInterval(countdown,1000);
countdown();

</script>

</body>
</html>
