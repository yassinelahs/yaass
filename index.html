<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAJA vs HUSA</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
}

body {
    background: #11141a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.ticket {
    width: 100%;
    max-width: 400px;
    background: #ffffff;
    border-radius: 24px;
    padding: 24px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    position: relative;
}

.close {
    display: flex;
    justify-content: flex-end;
    font-size: 26px;
    color: #a0aec0;
    cursor: pointer;
    line-height: 1;
    margin-bottom: 8px;
    font-weight: 300;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
}

.team {
    text-align: center;
    flex: 1;
}

.team img {
    width: 68px;
    height: 68px;
    object-fit: contain;
}

.team-name {
    margin-top: 8px;
    font-weight: 700;
    font-size: 15px;
    color: #1a202c;
    letter-spacing: 0.5px;
}

.center {
    text-align: center;
    flex: 1.2;
    padding: 0 10px;
}

.date {
    color: #718096;
    font-size: 12px;
    text-transform: capitalize;
    font-weight: 500;
}

.days {
    color: #2d3748;
    font-weight: 700;
    font-size: 14px;
    margin-top: 2px;
}

.time {
    font-size: 38px;
    font-weight: 800;
    color: #1a202c;
    line-height: 1.1;
    margin-top: 4px;
    letter-spacing: -1px;
}

/* QR Section */
.qr-container {
    margin: 24px 0;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
}

.qr-box {
    width: 200px;
    height: 200px;
    position: relative;
    background: #ffffff;
    border-radius: 16px;
    padding: 12px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    border: 1px solid #edf2f7;
}

.qr-image {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
}

/* Snake Laser Animation */
.snake {
    position: absolute;
    background: #00d84a;
    border-radius: 10px;
    box-shadow: 0 0 12px #00ff66, 0 0 20px #00ff66;
    animation: snakeMove 6s linear infinite;
}

@keyframes snakeMove {
    0% {
        top: 0; left: 0;
        width: 60px; height: 4px;
    }
    20% {
        top: 0; left: calc(100% - 60px);
        width: 60px; height: 4px;
    }
    25% {
        top: 0; left: calc(100% - 4px);
        width: 4px; height: 60px;
    }
    45% {
        top: calc(100% - 60px); left: calc(100% - 4px);
        width: 4px; height: 60px;
    }
    50% {
        top: calc(100% - 4px); left: calc(100% - 60px);
        width: 60px; height: 4px;
    }
    70% {
        top: calc(100% - 4px); left: 0;
        width: 60px; height: 4px;
    }
    75% {
        top: calc(100% - 60px); left: 0;
        width: 4px; height: 60px;
    }
    95% {
        top: 0; left: 0;
        width: 4px; height: 60px;
    }
    100% {
        top: 0; left: 0;
        width: 60px; height: 4px;
    }
}

.qr-box::after {
    content: '';
    position: absolute;
    inset: -2px;
    border: 2px solid rgba(0, 216, 74, 0.2);
    border-radius: 18px;
    pointer-events: none;
}

/* Navigation Overlays */
.nav {
    position: absolute;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 10px;
    pointer-events: none;
}

.arrow {
    font-size: 36px;
    color: #00c853;
    font-weight: bold;
    cursor: pointer;
    pointer-events: auto;
    user-select: none;
    transition: transform 0.2s;
}

.arrow:hover {
    transform: scale(1.2);
}

/* Typography Text */
.security {
    margin: 20px 0;
    text-align: center;
    color: #4a5568;
    font-size: 13px;
    line-height: 1.5;
    font-weight: 500;
}

/* Modernized Info Card */
.card {
    margin-top: 20px;
    background: #00c853;
    color: white;
    border-radius: 20px;
    padding: 20px;
    position: relative;
    box-shadow: 0 6px 16px rgba(0, 200, 83, 0.25);
}

.row {
    display: flex;
    margin-bottom: 16px;
}

.row > div {
    flex: 1;
}

.label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    opacity: 0.85;
    font-weight: 600;
}

.value {
    font-size: 16px;
    font-weight: 700;
    margin-top: 3px;
}

.timer {
    font-size: 32px;
    font-weight: 800;
    display: inline-block;
    vertical-align: middle;
    letter-spacing: -0.5px;
}

.code {
    float: right;
    background: rgba(255, 255, 255, 0.22);
    padding: 6px 14px;
    border-radius: 8px;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.5px;
    margin-top: 4px;
}

/* Button & Pagination */
.transfer {
    width: 100%;
    height: 56px;
    border: none;
    margin-top: 20px;
    border-radius: 14px;
    background: #00c853;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 700;
    transition: background 0.2s, transform 0.1s;
    box-shadow: 0 4px 12px rgba(0, 200, 83, 0.15);
}

.transfer:hover {
    background: #00b047;
}

.transfer:active {
    transform: scale(0.98);
}

.transfer svg {
    width: 18px;
    height: 18px;
}

.page {
    text-align: center;
    margin-top: 16px;
    color: #a0aec0;
    font-size: 14px;
    font-weight: 600;
}
</style>
</head>

<body>

<div class="ticket">

    <div class="close">×</div>

    <div class="header">
        <div class="team">
            <img src="rca.png" alt="Raja">
            <div class="team-name">RAJA</div>
        </div>

        <div class="center">
            <div class="date" id="date"></div>
            <div class="days">Aujourd'hui</div>
            <div class="time">18:00</div>
        </div>

        <div class="team">
            <img src="husa.png" alt="CODM">
            <div class="team-name">HUSA</div>
        </div>
    </div>

    <div class="qr-container">
        <div class="qr-box">
            <img src="qr.png" class="qr-image" alt="QR Code">
            <div class="snake"></div>
        </div>

        <div class="nav">
            <div class="arrow">‹</div>
            <div class="arrow">›</div>
        </div>
    </div>

    <div class="security">
        Pour votre sécurité,<br>
        votre QR Code s'affichera quelques heures avant le match.
    </div>

    <div class="card">
        <div class="row">
            <div>
                <div class="label">Catégorie</div>
                <div class="value">Tribune Est - Sud</div>
            </div>
            <div>
                <div class="label">Porte</div>
                <div class="value">23</div>
            </div>
            <div>
                <div class="label">Zone</div>
                <div class="value">Zone 6</div>
            </div>
        </div>

        <div class="row" style="margin-bottom: 24px;">
            <div>
                <div class="label">Rang</div>
                <div class="value">AW</div>
            </div>
            <div>
                <div class="label">Siège</div>
                <div class="value">28</div>
            </div>
        </div>

        <div>
            <div class="timer" id="countdown"></div>
            <div class="code">F4PM</div>
        </div>
    </div>

    <button class="transfer">
        <svg viewBox="0 0 24 24" fill="none">
            <path d="M22 2L11 13" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
        </svg>
        <span>Transférer le billet</span>
    </button>

    <div class="page">1/5</div>

</div>

<script>
const now = new Date();

document.getElementById('date').innerHTML =
now.toLocaleDateString('fr-FR',{
    weekday:'long',
    day:'numeric',
    month:'long',
    year:'numeric'
});

let target = new Date();
target.setHours(15,0,0,0);

function countdown(){
    let diff = target - new Date();

    if(diff < 0){
        document.getElementById('countdown').innerHTML='MATCH LIVE';
        return;
    }

    let h = Math.floor(diff/1000/60/60);
    let m = Math.floor(diff/1000/60)%60;
    let s = Math.floor(diff/1000)%60;

    document.getElementById('countdown').innerHTML =
    String(h).padStart(2,'0') + ':' +
    String(m).padStart(2,'0') + ':' +
    String(s).padStart(2,'0');
}

setInterval(countdown,1000);
countdown();
</script>

</body>
</html>
