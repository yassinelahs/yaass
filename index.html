<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Ticket</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    padding:20px;
}

.ticket-container{
    width:100%;
    max-width:400px;
}

.ticket{
    background:white;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
}

.header{
    text-align:center;
    padding:20px;
}

.header h2{
    font-size:28px;
    margin-bottom:10px;
}

.match-info{
    text-align:center;
    padding:20px;
}

.teams{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.team{
    width:120px;
}

.team img{
    width:60px;
    height:60px;
    object-fit:contain;
}

.team-name{
    font-size:22px;
    font-weight:bold;
    margin-top:10px;
}

.time{
    font-size:42px;
    font-weight:bold;
}

.today{
    color:#666;
    margin-bottom:5px;
}

.qr-section{
    text-align:center;
    padding:20px;
}

.qr-section img{
    width:220px;
    border-radius:12px;
}

.note{
    color:#777;
    font-size:14px;
    margin-top:15px;
    line-height:1.4;
}

.details{
    background:#008c45;
    color:white;
    padding:25px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.label{
    font-size:14px;
    opacity:.8;
}

.value{
    font-size:26px;
    font-weight:bold;
    margin-top:5px;
}

.full{
    grid-column:1/3;
}

</style>
</head>
<body>

<div class="ticket-container">

<div class="ticket">

<div class="header">
    <h3>Dimanche 14 Juin 2026</h3>
    <p>Complexe Sportif Mohammed V</p>
</div>

<div class="match-info">

    <div class="teams">

        <div class="team">
            <img src="https://upload.wikimedia.org/wikipedia/en/thumb/6/6d/Raja_CA_logo.svg/1200px-Raja_CA_logo.svg.png">
            <div class="team-name">RAJA</div>
        </div>

        <div>
            <div class="today">Aujourd'hui</div>
            <div class="time">16:00</div>
        </div>

        <div class="team">
            <img src="https://upload.wikimedia.org/wikipedia/en/4/4f/Union_Touarga_logo.png">
            <div class="team-name">UTS</div>
        </div>

    </div>

</div>

<div class="qr-section">

    <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=TICKET-123456">

    <div class="note">
        Pour votre sécurité, votre QR Code<br>
        s'affichera quelques heures avant le match.
    </div>

</div>

<div class="details">

    <div class="grid">

        <div class="full">
            <div class="label">Catégorie</div>
            <div class="value">Tribune Est - Sud</div>
        </div>

        <div>
            <div class="label">Porte</div>
            <div class="value">23</div>
        </div>

        <div>
            <div class="label">Zone</div>
            <div class="value">7</div>
        </div>

        <div>
            <div class="label">Rang</div>
            <div class="value">AW</div>
        </div>

        <div>
            <div class="label">Siège</div>
            <div class="value">28</div>
        </div>

    </div>

</div>

</div>

</div>

</body>
</html>
